name: Generate Economic Calendar ICS

on:
  schedule:
    - cron: '0 17 * * 0'     # Dimanche 18h France
  workflow_dispatch:         # Pour tester manuellement

permissions:
  contents: write            # ← Important pour push gh-pages

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests icalendar pytz

      - name: Generate filtered ICS
        run: python generate_calendar.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true   # ← Aide pour les premiers déploiements
